server:
  port: 8086

spring:
  application:
    name: donaton-logistica
  datasource:
    url: jdbc:mysql://localhost:3306/logistica_db
    username: root
    password: root_password_123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # Útil para desarrollo inicial, en producción usar 'validate' o Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
