server:
    port: 8085

spring:
    application:
        name: donaton-donaciones

    datasource:
        url: jdbc:mysql://localhost:3306/donaciones_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        username: donaton_user
        password: donaton_password
        driver-class-name: com.mysql.cj.jdbc.Driver
    
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/