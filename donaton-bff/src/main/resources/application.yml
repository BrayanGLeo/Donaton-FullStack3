server:
    port: 8083

spring:
    application:
        name: donaton-bff

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

resilience4j.circuitbreaker:
  instances:
    necesidadesService:
      slidingWindowSize: 5
      failureRateThreshold: 50
      waitDurationInOpenState: 10s
      permittedNumberOfCallsInHalfOpenState: 3