server:
    port: 8084

spring:
    application:
        name: donaton-auth
    
    datasource:
        url: jdbc:mysql://localhost:3306/donaton_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        username: root
        password: root_password_123
        driver-class-name: com.mysql.cj.jdbc.Driver
        
    
    jpa:
        show-sql: true
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/